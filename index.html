<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラタタラ語 辞書 [LIVE DATABASE]</title>
    <style>
        /* SF・サイバーパンク風スタイル */
        body { 
            font-family: 'Segoe UI', "Meiryo", sans-serif; 
            margin: 0; background-color: #05050a;
            color: #c5d3e8; line-height: 1.6;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            padding-bottom: 50px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        h1 { 
            text-align: center; color: #00f0ff; font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            letter-spacing: 4px; margin: 40px 0;
            text-transform: uppercase;
        }

        #status { text-align: center; font-family: monospace; font-size: 0.8rem; color: #00f0ff; margin-bottom: 20px; }

        /* フィルター */
        .filter-area {
            background: rgba(10, 15, 25, 0.9); border: 1px solid #1a4a5e;
            padding: 15px; border-radius: 4px; margin-bottom: 30px;
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .pos-btn {
            background: transparent; border: 1px solid #1a4a5e; color: #8ab4f8;
            padding: 5px 12px; cursor: pointer; font-size: 0.85rem; border-radius: 2px;
            transition: 0.2s;
        }
        .pos-btn.active { border-color: #00f0ff; color: #00f0ff; background: rgba(0, 240, 255, 0.1); }

        /* 辞書表示 */
        .pos-section { margin-bottom: 50px; }
        .pos-title { 
            color: #b0f2b6; border-left: 4px solid #b0f2b6; 
            padding-left: 15px; margin-bottom: 20px; font-weight: 300; letter-spacing: 2px;
        }
        
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        
        .word-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid #1a4a5e;
            padding: 15px; position: relative; transition: 0.2s; cursor: pointer;
        }
        .word-card:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); }

        .jp-word { font-size: 1rem; color: #ffffff; font-weight: bold; display: block; }
        
        .lata-word { 
            display: block; font-size: 1.4rem; color: #ff2a7a; margin-top: 5px;
            text-shadow: 0 0 5px rgba(255, 42, 122, 0.4);
            min-height: 1.5rem;
        }

        .details { margin-top: 12px; padding-top: 10px; border-top: 1px dashed rgba(26, 74, 94, 0.5); font-size: 0.85rem; display: none; }
        .details.active { display: block; animation: fadeIn 0.3s ease; }

        .details strong { color: #00f0ff; display: block; font-size: 0.7rem; margin-top: 8px; letter-spacing: 1px; }
        
        /* 例文の日本語訳スタイル */
        .ex-jp { color: #8ab4f8; font-style: italic; margin-top: 4px; display: block; padding-left: 5px; border-left: 1px solid #1a4a5e; }

        .hidden { display: none; }
        .no-data { opacity: 0.4; font-style: italic; font-size: 0.8rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>LATATALOT DATABASE</h1>
    <div id="status">> INITIALIZING...</div>

    <div id="filter-container" class="filter-area">
        <div class="filter-group" id="filter-buttons"></div>
    </div>

    <div id="dictionary-root"></div>
</div>

<script>
    // ★ここにスプレッドシートのCSV URLを貼り付けてください
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCRQkpXSJl-NfcWTSkOg6lA3cL7XDz25ubHhhQN4iyiD0GRQrzAxmTxHAxWPnmHQTDtORjp-yRX75Z/pub?gid=0&single=true&output=csv';

    let dictionaryData = {};
    let activeFilters = new Set();

    async function loadDictionary() {
        const status = document.getElementById('status');
        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            parseCSV(csvText);
            status.innerText = '> SYSTEM ONLINE: DATABASE SYNC COMPLETED';
            renderFilters();
            renderDictionary();
        } catch (e) {
            status.innerText = '> ERROR: CONNECTION FAILED';
            console.error(e);
        }
    }

    function parseCSV(text) {
        // 改行で分割
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
        dictionaryData = {};

        for (let i = 1; i < rows.length; i++) {
            // カンマで分割。引用符で囲まれたカンマなど複雑なケースには簡易対応
            const cols = rows[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
            if (cols.length < 2) continue;

            // F列(index 5)まで取得するように拡張
            const [pos, jp, lata, nuance, example, exampleJp] = cols;
            
            const category = pos || "未分類";
            if (!dictionaryData[category]) dictionaryData[category] = [];
            
            dictionaryData[category].push({ 
                jp: jp || "", 
                lata: lata || "", 
                nuance: nuance || "", 
                example: example || "",
                exampleJp: exampleJp || "" // 新しく追加
            });
        }
    }

    function renderFilters() {
        const container = document.getElementById('filter-buttons');
        const poses = Object.keys(dictionaryData);
        container.innerHTML = `<button class="pos-btn active" id="btn-all" onclick="filterAll()">ALL</button>`;
        poses.forEach(pos => {
            container.innerHTML += `<button class="pos-btn" onclick="toggleFilter('${pos}', this)">${pos}</button>`;
        });
    }

    function renderDictionary() {
        const root = document.getElementById('dictionary-root');
        root.innerHTML = '';

        for (const pos in dictionaryData) {
            const section = document.createElement('section');
            section.className = 'pos-section';
            section.setAttribute('data-pos', pos);

            const title = document.createElement('h2');
            title.className = 'pos-title';
            title.innerText = `[ ${pos} ]`;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'word-grid';

            dictionaryData[pos].forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.onclick = () => {
                    const det = card.querySelector('.details');
                    det.classList.toggle('active');
                };

                card.innerHTML = `
                    <span class="jp-word">${item.jp}</span>
                    <span class="lata-word">${item.lata || '<span class="no-data">undefined</span>'}</span>
                    <div class="details">
                        ${item.nuance ? `<strong>[NUANCE]</strong> ${item.nuance}` : ''}
                        ${item.example ? `<strong>[EXAMPLE]</strong> ${item.example}` : ''}
                        ${item.exampleJp ? `<span class="ex-jp">${item.exampleJp}</span>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            section.appendChild(grid);
            root.appendChild(section);
        }
    }

    function toggleFilter(pos, btn) {
        document.getElementById('btn-all').classList.remove('active');
        btn.classList.toggle('active');

        if (activeFilters.has(pos)) activeFilters.delete(pos);
        else activeFilters.add(pos);

        if (activeFilters.size === 0) {
            filterAll();
            return;
        }
        applyFilters();
    }

    function filterAll() {
        activeFilters.clear();
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-all').classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        document.querySelectorAll('.pos-section').forEach(sec => {
            const pos = sec.getAttribute('data-pos');
            if (activeFilters.size === 0 || activeFilters.has(pos)) {
                sec.classList.remove('hidden');
            } else {
                sec.classList.add('hidden');
            }
        });
    }

    loadDictionary();
</script>

</body>
</html>
