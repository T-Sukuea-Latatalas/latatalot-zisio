<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラタタラ辞書</title>
    <style>
        /* --- フォント設定 --- */
        @font-face {
            font-family: 'Latatala_font2-Regular';
            src: url('Latatala_font2-Regular.ttf') format('ttf'),
                 url('Latatala_font2-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* SF・サイバーパンク風スタイル */
        body { 
            font-family: 'Segoe UI', "Meiryo", sans-serif; 
            margin: 0; background-color: #05050a;
            color: #c5d3e8; line-height: 1.6;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            padding-bottom: 50px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        h1 { 
            text-align: center; color: #00f0ff; font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            letter-spacing: 4px; margin: 40px 0;
            text-transform: uppercase;
        }

        #status { text-align: center; font-family: monospace; font-size: 0.8rem; color: #00f0ff; margin-bottom: 20px; }

        /* フィルター */
        .filter-area {
            background: rgba(10, 15, 25, 0.9); border: 1px solid #1a4a5e;
            padding: 15px; border-radius: 4px; margin-bottom: 30px;
            position: sticky; top: 10px; z-index: 100;
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .pos-btn {
            background: transparent; border: 1px solid #1a4a5e; color: #8ab4f8;
            padding: 5px 12px; cursor: pointer; font-size: 0.85rem; border-radius: 2px;
            transition: 0.2s;
        }
        .pos-btn.active { border-color: #00f0ff; color: #00f0ff; background: rgba(0, 240, 255, 0.1); }

        /* 辞書表示 */
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .word-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid #1a4a5e;
            padding: 15px; position: relative; transition: 0.2s; cursor: pointer;
        }
        .word-card:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.08); }

        /* ラタタラ語専用スタイル */
        .lata-word { 
            display: block; font-size: 1.8rem; color: #ff2a7a; margin-bottom: 12px;
            text-shadow: 0 0 5px rgba(255, 42, 122, 0.4);
            font-family: 'Latatala_font2-Regular', sans-serif;
        }

        /* 意味ごとのブロック */
        .meaning-item {
            border-top: 1px solid rgba(0, 240, 255, 0.1);
            padding-top: 10px;
            margin-bottom: 10px;
        }
        .meaning-item:first-of-type { border-top: none; padding-top: 0; }

        .pos-tag {
            font-size: 0.7rem; color: #00f0ff; border: 1px solid #00f0ff;
            padding: 1px 4px; border-radius: 3px; margin-right: 6px; 
            font-family: sans-serif; vertical-align: middle;
        }

        .jp-word { font-size: 1rem; color: #ffffff; font-weight: bold; vertical-align: middle; }
        
        .details { margin-top: 8px; font-size: 0.85rem; display: none; }
        .details.active { display: block; animation: fadeIn 0.3s ease; }

        .details strong { color: #00f0ff; display: block; font-size: 0.7rem; margin-top: 8px; letter-spacing: 1px; font-family: sans-serif; }
        
        .lata-text { font-family: 'Latatala_font2-Regular', sans-serif; }
        .ex-lata { display: block; font-size: 1.1rem; color: #c5d3e8; margin-top: 2px; }
        .ex-jp { color: #8ab4f8; font-style: italic; margin-top: 4px; display: block; padding-left: 5px; border-left: 1px solid #1a4a5e; font-family: "Meiryo", sans-serif; }

        .hidden { display: none !important; }
        .no-data { opacity: 0.4; font-style: italic; font-size: 0.8rem; font-family: sans-serif; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>LATATALOT DATABASE</h1>
    <div id="status">> INITIALIZING...</div>

    <div id="filter-container" class="filter-area">
        <div class="filter-group" id="filter-buttons"></div>
    </div>

    <div id="dictionary-root" class="word-grid"></div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCRQkpXSJl-NfcWTSkOg6lA3cL7XDz25ubHhhQN4iyiD0GRQrzAxmTxHAxWPnmHQTDtORjp-yRX75Z/pub?gid=0&single=true&output=csv';

    let dictionaryArray = []; 
    let allPosList = new Set();
    let activeFilters = new Set();

    async function loadDictionary() {
        const status = document.getElementById('status');
        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            parseCSV(csvText);
            status.innerText = '> SYSTEM ONLINE: DATABASE SYNC COMPLETED';
            renderFilters();
            renderDictionary();
        } catch (e) {
            status.innerText = '> ERROR: CONNECTION FAILED';
            console.error(e);
        }
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
        const tempMap = new Map(); // ラタタラ語をキーにして統合

        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
            if (cols.length < 2) continue;

            const [pos, jp, lata, nuance, example, exampleJp] = cols;
            if (!lata && !jp) continue;

            const wordKey = lata || `(undefined)-${i}`;

            if (!tempMap.has(wordKey)) {
                tempMap.set(wordKey, {
                    lata: lata,
                    meanings: [],
                    allPos: new Set()
                });
            }

            const entry = tempMap.get(wordKey);
            entry.meanings.push({ pos, jp, nuance, example, exampleJp });
            if (pos) {
                entry.allPos.add(pos);
                allPosList.add(pos);
            }
        }
        dictionaryArray = Array.from(tempMap.values());
    }

    function renderFilters() {
        const container = document.getElementById('filter-buttons');
        container.innerHTML = `<button class="pos-btn active" id="btn-all" onclick="filterAll()">ALL</button>`;
        Array.from(allPosList).sort().forEach(pos => {
            container.innerHTML += `<button class="pos-btn" onclick="toggleFilter('${pos}', this)">${pos}</button>`;
        });
    }

    function renderDictionary() {
        const root = document.getElementById('dictionary-root');
        root.innerHTML = '';

        dictionaryArray.forEach(wordData => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.setAttribute('data-pos-list', Array.from(wordData.allPos).join(','));
            
            card.onclick = () => {
                const details = card.querySelectorAll('.details');
                details.forEach(d => d.classList.toggle('active'));
            };

            let meaningsHtml = '';
            wordData.meanings.forEach(m => {
                meaningsHtml += `
                    <div class="meaning-item">
                        <div>
                            ${m.pos ? `<span class="pos-tag">${m.pos}</span>` : ''}
                            <span class="jp-word">${m.jp}</span>
                        </div>
                        <div class="details">
                            ${m.nuance ? `<strong>[NUANCE]</strong> ${m.nuance}` : ''}
                            ${m.example ? `<strong>[EXAMPLE]</strong> <span class="lata-text ex-lata">${m.example}</span>` : ''}
                            ${m.exampleJp ? `<span class="ex-jp">${m.exampleJp}</span>` : ''}
                        </div>
                    </div>
                `;
            });

            card.innerHTML = `
                <span class="lata-word">${wordData.lata || '<span class="no-data">undefined</span>'}</span>
                ${meaningsHtml}
            `;
            root.appendChild(card);
        });
    }

    function toggleFilter(pos, btn) {
        document.getElementById('btn-all').classList.remove('active');
        btn.classList.toggle('active');

        if (activeFilters.has(pos)) activeFilters.delete(pos);
        else activeFilters.add(pos);

        if (activeFilters.size === 0) {
            filterAll();
            return;
        }
        applyFilters();
    }

    function filterAll() {
        activeFilters.clear();
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-all').classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const cards = document.querySelectorAll('.word-card');
        cards.forEach(card => {
            if (activeFilters.size === 0) {
                card.classList.remove('hidden');
                return;
            }
            const cardPosList = card.getAttribute('data-pos-list').split(',');
            const hasMatch = Array.from(activeFilters).some(filter => cardPosList.includes(filter));
            if (hasMatch) card.classList.remove('hidden');
            else card.classList.add('hidden');
        });
    }

    loadDictionary();
</script>

</body>
</html>
