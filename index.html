<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラタタラ辞書 - DATABASE</title>
    <style>
        /* --- 全体リセット --- */
        * { box-sizing: border-box; }

        /* --- フォント設定 --- */
        @font-face {
            font-family: 'Font_lttl3-Regular';
            src: url('Font_lttl3-Regular.ttf') format('truetype');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        .lata-font { font-family: 'Font_lttl3-Regular', sans-serif !important; }

        /* SF・サイバーパンク風スタイル */
        body { 
            font-family: 'Segoe UI', "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif; 
            margin: 0; background-color: #05050a;
            color: #c5d3e8; line-height: 1.6;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- ローディング画面 --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05050a; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loader-text {
            color: #00f0ff; font-family: monospace; font-size: 0.8rem;
            letter-spacing: 2px; text-transform: uppercase;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- メインコンテンツ --- */
        header { padding: 15px 15px 0 15px; flex-shrink: 0; }
        h1 { 
            text-align: center; color: #00f0ff; font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            letter-spacing: 4px; margin: 5px 0; text-transform: uppercase;
        }
        #status { text-align: center; font-family: monospace; font-size: 0.6rem; color: #00f0ff; margin-bottom: 10px; }

        .filter-area {
            background: rgba(10, 15, 25, 0.8); border: 1px solid #1a4a5e;
            padding: 8px; border-radius: 4px; margin-bottom: 10px;
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .pos-btn {
            background: transparent; border: 1px solid #1a4a5e; color: #8ab4f8;
            padding: 6px 12px; cursor: pointer; font-size: 0.75rem; border-radius: 2px;
            transition: 0.2s;
        }
        .pos-btn.active { border-color: #00f0ff; color: #00f0ff; background: rgba(0, 240, 255, 0.1); }

        .main-content {
            display: flex; flex: 1; overflow: hidden;
            border-top: 1px solid #1a4a5e; position: relative;
        }

        .list-section {
            flex: 3; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px; align-content: flex-start;
        }

        .detail-section {
            flex: 1.2; background: rgba(5, 5, 15, 0.98);
            border-left: 1px solid #00f0ff; padding: 20px;
            overflow-y: auto; box-shadow: -10px 0 20px rgba(0, 0, 0, 0.5);
            min-width: 300px; transition: transform 0.3s ease;
        }

        .word-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid #1a4a5e;
            padding: 12px; cursor: pointer; transition: 0.2s;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center;
            min-height: 70px;
        }
        .word-card:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.08); }
        .word-card.selected { border-color: #ff2a7a; background: rgba(255, 42, 122, 0.1); }

        .card-lata, .card-jp {
            display: block; white-space: nowrap; overflow: hidden;
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }
        .card-lata { font-size: 1.3rem; color: #ff2a7a; margin-bottom: 2px; }
        .card-jp { font-size: 0.8rem; color: #ffffff; opacity: 0.8; }

        .detail-header { border-bottom: 1px solid #ff2a7a; margin-bottom: 15px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .detail-lata { font-size: 2rem; color: #ff2a7a; text-shadow: 0 0 10px rgba(255, 42, 122, 0.5); }
        .close-detail { display: none; background: #ff2a7a; color: white; border: none; padding: 8px 15px; font-size: 0.8rem; cursor: pointer; border-radius: 2px; }

        .detail-item { margin-bottom: 20px; background: rgba(0, 240, 255, 0.03); padding: 15px; border-radius: 4px; border: 1px solid rgba(0, 240, 255, 0.1); }
        .detail-pos { font-size: 0.65rem; color: #00f0ff; border: 1px solid #00f0ff; padding: 1px 4px; margin-right: 8px; vertical-align: middle; text-transform: uppercase; }
        .detail-jp { font-size: 1.2rem; font-weight: bold; color: #fff; }

        .section-title { color: #00f0ff; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin: 15px 0 5px 0; display: block; font-weight: bold; opacity: 0.8; }
        
        .ex-lata { display: block; font-size: 1.1rem; color: #c5d3e8; margin-top: 5px; }
        .ex-jp { color: #8ab4f8; font-style: italic; font-size: 0.9rem; border-left: 2px solid #1a4a5e; padding-left: 10px; margin-top: 5px; display: block; }

        .rel-grid { display: grid; grid-template-columns: 1fr; gap: 5px; font-size: 0.85rem; margin-top: 10px;}
        .rel-label { color: #00f0ff; font-weight: bold; margin-right: 8px; font-family: sans-serif; }

        .idiom-entry { background: rgba(255, 255, 255, 0.05); padding: 8px; margin-top: 5px; border-radius: 2px; }
        .idiom-lata { color: #ff2a7a; font-size: 1.1rem; }
        .idiom-jp { font-size: 0.8rem; margin-left: 8px; }

        .origin-info { color: #8ab4f8; font-size: 0.9rem; padding: 5px 0; font-family: sans-serif; }
        .origin-label { color: #00f0ff; font-weight: bold; margin-right: 5px; }

        .empty-notice { text-align: center; margin-top: 50px; color: #1a4a5e; font-family: monospace; font-size: 0.9rem; }
        .hidden { display: none !important; }
        .no-data { opacity: 0.4; font-size: 0.8rem; font-style: italic; font-family: sans-serif; }

        @media (max-width: 768px) {
            .list-section { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 10px; }
            .detail-section {
                position: absolute; top: 0; right: 0; bottom: 0; left: 0;
                width: 100%; min-width: 0; transform: translateX(100%);
                z-index: 100; border-left: none;
            }
            .detail-section.active { transform: translateX(0); }
            .close-detail { display: block; }
            h1 { font-size: 1rem; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #1a4a5e; border-radius: 3px; }
    </style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Accessing Latatalot Database...</div>
</div>

<header>
    <h1>LATATALOT DATABASE</h1>
    <div id="status">> INITIALIZING...</div>
    <div id="filter-container" class="filter-area">
        <div class="filter-group" id="filter-buttons"></div>
    </div>
</header>

<div class="main-content">
    <div id="dictionary-list" class="list-section"></div>
    <div id="detail-pane" class="detail-section">
        <div class="empty-notice">> SELECT A WORD TO VIEW DATA</div>
    </div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCRQkpXSJl-NfcWTSkOg6lA3cL7XDz25ubHhhQN4iyiD0GRQrzAxmTxHAxWPnmHQTDtORjp-yRX75Z/pub?gid=0&single=true&output=csv';

    let dictionaryArray = []; 
    let allPosList = new Set();
    let activeFilters = new Set();

    async function loadDictionary() {
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            parseCSV(csvText);
            status.innerText = '> SYSTEM ONLINE: DATABASE SYNC COMPLETED';
            renderFilters();
            renderDictionary();
            
            // 読み込み完了後に少しだけ余韻を残して消す
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 800);

        } catch (e) {
            status.innerText = '> ERROR: CONNECTION FAILED';
            // エラー時もローダーを消さないとエラーメッセージが見えないため消す
            loader.classList.add('hidden');
        }
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
        const tempMap = new Map(); 

        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
            if (cols.length < 2) continue;
            const [pos, jp, lata, nuance, example, exampleJp, syn, ant, rel, idioms, loanword] = cols;
            if (!lata && !jp) continue;
            const wordKey = lata || `(unknown)-${i}`;
            if (!tempMap.has(wordKey)) {
                tempMap.set(wordKey, { id: i, lata: lata, meanings: [], allPos: new Set() });
            }
            const entry = tempMap.get(wordKey);
            entry.meanings.push({ pos, jp, nuance, example, exampleJp, syn, ant, rel, idioms, loanword });
            if (pos) { entry.allPos.add(pos); allPosList.add(pos); }
        }
        dictionaryArray = Array.from(tempMap.values());
    }

    function renderFilters() {
        const container = document.getElementById('filter-buttons');
        container.innerHTML = `<button class="pos-btn active" id="btn-all" onclick="filterAll()">ALL</button>`;
        Array.from(allPosList).sort().forEach(pos => {
            container.innerHTML += `<button class="pos-btn" onclick="toggleFilter('${pos}', this)">${pos}</button>`;
        });
    }

    function renderDictionary() {
        const listRoot = document.getElementById('dictionary-list');
        listRoot.innerHTML = '';
        dictionaryArray.forEach((wordData, index) => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.setAttribute('data-pos-list', Array.from(wordData.allPos).join(','));
            card.onclick = () => showDetail(index, card);
            const primaryMeaning = wordData.meanings[0]?.jp || '---';
            card.innerHTML = `
                <span class="card-lata lata-font">${wordData.lata || '---'}</span>
                <span class="card-jp">${primaryMeaning}</span>
            `;
            listRoot.appendChild(card);
        });
    }

    function showDetail(index, cardElement) {
        document.querySelectorAll('.word-card').forEach(c => c.classList.remove('selected'));
        cardElement.classList.add('selected');

        const wordData = dictionaryArray[index];
        const detailPane = document.getElementById('detail-pane');
        
        let meaningsHtml = '';
        wordData.meanings.forEach(m => {
            let idiomsHtml = '';
            if (m.idioms) {
                m.idioms.split('/').forEach(pair => {
                    const parts = pair.split(':');
                    const iLata = parts[0];
                    const iJp = parts[1];
                    if (iLata) {
                        idiomsHtml += `
                            <div class="idiom-entry">
                                <span class="idiom-lata lata-font">${iLata.trim()}</span>
                                ${iJp ? `<span class="idiom-jp">${iJp.trim()}</span>` : ''}
                            </div>`;
                    }
                });
            }

            const wrapLata = (text) => (text && text !== "") ? `<span class="lata-font">${text}</span>` : '<span class="no-data">None</span>';

            meaningsHtml += `
                <div class="detail-item">
                    <div>${m.pos ? `<span class="detail-pos">${m.pos}</span>` : ''}<span class="detail-jp">${m.jp}</span></div>
                    
                    ${m.loanword ? `
                        <span class="section-title">[ORIGIN]</span>
                        <div class="origin-info"><span class="origin-label">Loanword:</span>${m.loanword}</div>
                    ` : ''}

                    <span class="section-title">[Nuance]</span>
                    <div>${m.nuance || '<span class="no-data">No description available</span>'}</div>
                    
                    <span class="section-title">[Example]</span>
                    ${m.example ? `<span class="lata-font ex-lata">${m.example}</span>` : '<span class="no-data">No example</span>'}
                    ${m.exampleJp ? `<span class="ex-jp">${m.exampleJp}</span>` : ''}
                    
                    <div class="rel-grid">
                        <div><span class="rel-label">SYN:</span>${wrapLata(m.syn)}</div>
                        <div><span class="rel-label">ANT:</span>${wrapLata(m.ant)}</div>
                        <div><span class="rel-label">REL:</span>${wrapLata(m.rel)}</div>
                    </div>
                    
                    <span class="section-title">[Idioms]</span>
                    <div>${idiomsHtml || '<span class="no-data">No idioms registered</span>'}</div>
                </div>
            `;
        });

        detailPane.innerHTML = `
            <div class="detail-header">
                <span class="detail-lata lata-font">${wordData.lata}</span>
                <button class="close-detail" onclick="closeDetail()">CLOSE</button>
            </div>
            ${meaningsHtml}
        `;
        detailPane.classList.add('active');
        detailPane.scrollTop = 0;
    }

    function closeDetail() {
        document.getElementById('detail-pane').classList.remove('active');
    }

    function toggleFilter(pos, btn) {
        document.getElementById('btn-all').classList.remove('active');
        btn.classList.toggle('active');
        if (activeFilters.has(pos)) activeFilters.delete(pos);
        else activeFilters.add(pos);
        if (activeFilters.size === 0) { filterAll(); return; }
        applyFilters();
    }

    function filterAll() {
        activeFilters.clear();
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-all').classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const cards = document.querySelectorAll('.word-card');
        cards.forEach(card => {
            if (activeFilters.size === 0) { card.classList.remove('hidden'); return; }
            const cardPosList = card.getAttribute('data-pos-list').split(',');
            const hasMatch = Array.from(activeFilters).some(filter => cardPosList.includes(filter));
            card.classList.toggle('hidden', !hasMatch);
        });
    }

    loadDictionary();
</script>

</body>
</html>
