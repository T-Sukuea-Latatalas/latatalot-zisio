<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラタタラ辞書 - DATABASE</title>
    <style>
        /* --- フォント設定 --- */
        @font-face {
            font-family: 'Latatala_font2-Regular';
            src: url('Latatala_font2-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        .lata-font {
            font-family: 'Latatala_font2-Regular', sans-serif !important;
        }

        /* SF・サイバーパンク風スタイル */
        body { 
            font-family: 'Segoe UI', "Meiryo", sans-serif; 
            margin: 0; background-color: #05050a;
            color: #c5d3e8; line-height: 1.6;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { padding: 20px 20px 0 20px; flex-shrink: 0; }

        h1 { 
            text-align: center; color: #00f0ff; font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            letter-spacing: 4px; margin: 10px 0;
            text-transform: uppercase;
        }

        #status { text-align: center; font-family: monospace; font-size: 0.7rem; color: #00f0ff; margin-bottom: 10px; }

        /* フィルター */
        .filter-area {
            background: rgba(10, 15, 25, 0.8); border: 1px solid #1a4a5e;
            padding: 10px; border-radius: 4px; margin-bottom: 10px;
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .pos-btn {
            background: transparent; border: 1px solid #1a4a5e; color: #8ab4f8;
            padding: 4px 10px; cursor: pointer; font-size: 0.75rem; border-radius: 2px;
            transition: 0.2s;
        }
        .pos-btn.active { border-color: #00f0ff; color: #00f0ff; background: rgba(0, 240, 255, 0.1); }

        /* メインレイアウト */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            border-top: 1px solid #1a4a5e;
        }

        /* 左側：リスト (3/4) */
        .list-section {
            flex: 3;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            align-content: flex-start;
        }

        /* 右側：詳細 (1/4) */
        .detail-section {
            flex: 1;
            background: rgba(5, 5, 15, 0.9);
            border-left: 1px solid #00f0ff;
            padding: 25px;
            overflow-y: auto;
            box-shadow: -10px 0 20px rgba(0, 0, 0, 0.5);
            min-width: 300px;
        }

        /* 単語カード（簡易版） */
        .word-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid #1a4a5e;
            padding: 12px; cursor: pointer; transition: 0.2s;
            position: relative;
        }
        .word-card:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.08); }
        .word-card.selected { border-color: #ff2a7a; background: rgba(255, 42, 122, 0.1); }

        .card-lata { display: block; font-size: 1.4rem; color: #ff2a7a; margin-bottom: 4px; }
        .card-jp { font-size: 0.85rem; color: #ffffff; opacity: 0.8; }

        /* 詳細パネル内の要素 */
        .detail-header { border-bottom: 1px solid #ff2a7a; margin-bottom: 20px; padding-bottom: 10px; }
        .detail-lata { font-size: 2.5rem; color: #ff2a7a; text-shadow: 0 0 10px rgba(255, 42, 122, 0.5); display: block; }
        
        .detail-item { margin-bottom: 25px; background: rgba(0, 240, 255, 0.03); padding: 15px; border-radius: 4px; }
        .detail-pos { font-size: 0.7rem; color: #00f0ff; border: 1px solid #00f0ff; padding: 1px 4px; margin-right: 8px; }
        .detail-jp { font-size: 1.2rem; font-weight: bold; color: #fff; }

        .section-title { color: #00f0ff; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin: 15px 0 5px 0; display: block; font-weight: bold;}
        
        .ex-lata { display: block; font-size: 1.1rem; color: #c5d3e8; margin-top: 5px; }
        .ex-jp { color: #8ab4f8; font-style: italic; font-size: 0.9rem; border-left: 2px solid #1a4a5e; padding-left: 10px; margin-top: 5px; display: block; }

        .rel-grid { display: grid; grid-template-columns: 1fr; gap: 5px; font-size: 0.85rem; margin-top: 10px;}
        .rel-label { color: #00f0ff; font-weight: bold; margin-right: 10px; }

        .idiom-entry { background: rgba(255, 255, 255, 0.05); padding: 8px; margin-top: 5px; border-radius: 2px; }
        .idiom-lata { color: #ff2a7a; font-size: 1.1rem; }
        .idiom-jp { font-size: 0.8rem; margin-left: 10px; }

        .empty-notice { text-align: center; margin-top: 100px; color: #1a4a5e; font-family: monospace; }
        .hidden { display: none !important; }
        .no-data { opacity: 0.4; font-size: 0.8rem; font-style: italic; }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #1a4a5e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }
    </style>
</head>
<body>

<header>
    <h1>LATATALOT DATABASE</h1>
    <div id="status">> INITIALIZING...</div>

    <div id="filter-container" class="filter-area">
        <div class="filter-group" id="filter-buttons"></div>
    </div>
</header>

<div class="main-content">
    <!-- 左側：リスト -->
    <div id="dictionary-list" class="list-section"></div>

    <!-- 右側：詳細 -->
    <div id="detail-pane" class="detail-section">
        <div class="empty-notice">> SELECT A WORD TO VIEW DATA</div>
    </div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCRQkpXSJl-NfcWTSkOg6lA3cL7XDz25ubHhhQN4iyiD0GRQrzAxmTxHAxWPnmHQTDtORjp-yRX75Z/pub?gid=0&single=true&output=csv';

    let dictionaryArray = []; 
    let allPosList = new Set();
    let activeFilters = new Set();

    async function loadDictionary() {
        const status = document.getElementById('status');
        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            parseCSV(csvText);
            status.innerText = '> SYSTEM ONLINE: DATABASE SYNC COMPLETED';
            renderFilters();
            renderDictionary();
        } catch (e) {
            status.innerText = '> ERROR: CONNECTION FAILED';
            console.error(e);
        }
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/).filter(row => row.trim() !== '');
        const tempMap = new Map(); 

        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
            if (cols.length < 2) continue;

            const [pos, jp, lata, nuance, example, exampleJp, syn, ant, rel, idioms] = cols;
            if (!lata && !jp) continue;

            const wordKey = lata || `(sisok)-${i}`;

            if (!tempMap.has(wordKey)) {
                tempMap.set(wordKey, {
                    id: i,
                    lata: lata,
                    meanings: [],
                    allPos: new Set()
                });
            }

            const entry = tempMap.get(wordKey);
            entry.meanings.push({ 
                pos, jp, nuance, example, exampleJp,
                syn: syn || "", 
                ant: ant || "", 
                rel: rel || "", 
                idioms: idioms || "" 
            });
            if (pos) {
                entry.allPos.add(pos);
                allPosList.add(pos);
            }
        }
        dictionaryArray = Array.from(tempMap.values());
    }

    function renderFilters() {
        const container = document.getElementById('filter-buttons');
        container.innerHTML = `<button class="pos-btn active" id="btn-all" onclick="filterAll()">ALL</button>`;
        Array.from(allPosList).sort().forEach(pos => {
            container.innerHTML += `<button class="pos-btn" onclick="toggleFilter('${pos}', this)">${pos}</button>`;
        });
    }

    function renderDictionary() {
        const listRoot = document.getElementById('dictionary-list');
        listRoot.innerHTML = '';

        dictionaryArray.forEach((wordData, index) => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.setAttribute('data-pos-list', Array.from(wordData.allPos).join(','));
            card.onclick = () => showDetail(index, card);
            
            // リスト表示用：最初の意味だけ表示
            const primaryMeaning = wordData.meanings[0]?.jp || '---';

            card.innerHTML = `
                <span class="card-lata lata-font">${wordData.lata || '---'}</span>
                <span class="card-jp">${primaryMeaning}</span>
            `;
            listRoot.appendChild(card);
        });
    }

    function showDetail(index, cardElement) {
        // ハイライトの切り替え
        document.querySelectorAll('.word-card').forEach(c => c.classList.remove('selected'));
        cardElement.classList.add('selected');

        const wordData = dictionaryArray[index];
        const detailPane = document.getElementById('detail-pane');
        
        let meaningsHtml = '';
        wordData.meanings.forEach(m => {
            let idiomsHtml = '';
            if (m.idioms) {
                const idiomPairs = m.idioms.split('/');
                idiomPairs.forEach(pair => {
                    const [iLata, iJp] = pair.split(':');
                    if (iLata) {
                        idiomsHtml += `
                            <div class="idiom-entry">
                                <span class="idiom-lata lata-font">${iLata.trim()}</span>
                                ${iJp ? `<span class="idiom-jp">${iJp.trim()}</span>` : ''}
                            </div>
                        `;
                    }
                });
            }

            meaningsHtml += `
                <div class="detail-item">
                    <div>
                        ${m.pos ? `<span class="detail-pos">${m.pos}</span>` : ''}
                        <span class="detail-jp">${m.jp}</span>
                    </div>

                    <span class="section-title">[Nuance]</span>
                    <div>${m.nuance || '<span class="no-data">No description available</span>'}</div>
                    
                    <span class="section-title">[Example]</span>
                    ${m.example ? `<span class="lata-font ex-lata">${m.example}</span>` : '<span class="no-data">No example</span>'}
                    ${m.exampleJp ? `<span class="ex-jp">${m.exampleJp}</span>` : ''}
                    
                    <div class="rel-grid">
                        <div><span class="rel-label">SYN:</span><span class="lata-font">${m.syn || '<small class="no-data">None</small>'}</span></div>
                        <div><span class="rel-label">ANT:</span><span class="lata-font">${m.ant || '<small class="no-data">None</small>'}</span></div>
                        <div><span class="rel-label">REL:</span><span class="lata-font">${m.rel || '<small class="no-data">None</small>'}</span></div>
                    </div>

                    <span class="section-title">[Idioms]</span>
                    <div>${idiomsHtml || '<span class="no-data">No idioms registered</span>'}</div>
                </div>
            `;
        });

        detailPane.innerHTML = `
            <div class="detail-header">
                <span class="detail-lata lata-font">${wordData.lata}</span>
            </div>
            ${meaningsHtml}
        `;
        detailPane.scrollTop = 0; // スクロールを上に戻す
    }

    function toggleFilter(pos, btn) {
        document.getElementById('btn-all').classList.remove('active');
        btn.classList.toggle('active');

        if (activeFilters.has(pos)) activeFilters.delete(pos);
        else activeFilters.add(pos);

        if (activeFilters.size === 0) {
            filterAll();
            return;
        }
        applyFilters();
    }

    function filterAll() {
        activeFilters.clear();
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-all').classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const cards = document.querySelectorAll('.word-card');
        cards.forEach(card => {
            if (activeFilters.size === 0) {
                card.classList.remove('hidden');
                return;
            }
            const cardPosList = card.getAttribute('data-pos-list').split(',');
            const hasMatch = Array.from(activeFilters).some(filter => cardPosList.includes(filter));
            if (hasMatch) card.classList.remove('hidden');
            else card.classList.add('hidden');
        });
    }

    loadDictionary();
</script>

</body>
</html>
